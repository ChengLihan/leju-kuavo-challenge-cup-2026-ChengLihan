      - "0.35 0.65"
      - "0.35 -0.65"
      - "-0.35 0.65"
      - "-0.35 -0.65"
    leg_material: "table_leg_mat"

  - type: "marker"
    name: "weighing_area_0p2m_square"
    parent: "challenge_table"
    size: "0.10 0.10 0.002"
    pos: "-0.22 -0.36 0.833"
    material: "weighing_area_mat"

  - type: "open_box"
    name: "sorting_box_0p4_0p3_0p3"
    pos: "0.10 0.29 0.83"
    movable: true
    mass: 0.80
    friction: "1.8 0.6 0.02"
    condim: "6"
    solref: "0.012 1.2"
    solimp: "0.95 0.99 0.001"
    inner_size: "0.40 0.30 0.30"
    wall_thickness: 0.024
    floor_thickness: 0.016
    floor_material: "drop_box_mat"
    wall_material: "drop_box_edge_mat"

  - type: "parcel"
    name: "parcel_1"
    pos: "-0.26 -0.31 0.880"
    size: "0.0225 0.060 0.050"
    euler: "0 0 1.5708"
    material: "parcel_brown_mat"
    style: "courier"
    mass: 0.18
    friction: "4.5 1.2 0.03"
    condim: "6"
    solref: "0.008 1.2"
    solimp: "0.95 0.99 0.001"

  - type: "parcel"
