  floor_mat:
    texture:
      type: "2d"
      file: "../../textures/matte_floor_green.png"
    texrepeat: "24 24"
    texuniform: "false"
    rgba: "0.24 0.38 0.30 1"
    reflectance: "0.02"
    shininess: "0.05"
  factory_wall_mat:
    rgba: "0.50 0.54 0.55 1"
    specular: "0.04"
    shininess: "0.02"
  factory_wall_panel_mat:
    rgba: "0.38 0.42 0.43 1"
    specular: "0.03"
    shininess: "0.02"
  table_top_mat:
    rgba: "0.10 0.30 0.10 1"
    specular: "0.1"
    shininess: "0.1"
  table_leg_mat:
    rgba: "0.60 0.60 0.60 1"
    specular: "0.1"
    shininess: "0.1"
  parcel_brown_mat:
    rgba: "0.88 0.84 0.73 1"
    specular: "0.08"
    shininess: "0.04"
  parcel_yellow_mat:
    rgba: "0.92 0.78 0.38 1"
    specular: "0.08"
    shininess: "0.04"
  parcel_orange_mat:
    rgba: "0.90 0.55 0.28 1"
    specular: "0.08"
    shininess: "0.04"
  parcel_blue_mat:
    rgba: "0.78 0.84 0.92 1"
    specular: "0.08"
    shininess: "0.04"
  parcel_tape_mat:
    rgba: "0.92 0.78 0.43 1"
    specular: "0.04"
    shininess: "0.02"
  parcel_label_mat:
    rgba: "0.96 0.96 0.88 1"
    specular: "0.02"
    shininess: "0.02"
  parcel_label_line_mat:
    rgba: "0.12 0.12 0.10 1"
    specular: "0.01"
    shininess: "0.01"
  weighing_area_mat:
    rgba: "0.10 0.62 0.26 0.85"
    emission: "0.15"
  drop_box_mat:
    rgba: "0.10 0.62 0.34 0.55"
    emission: "0.08"
  drop_box_edge_mat:
    rgba: "0.02 0.28 0.15 1"

ground:
  enabled: true
  name: "floor"
  size: "8 8 0.05"
  material: "floor_mat"
  condim: "3"
  friction: "1 0.1 0.1"

lights:
  - name: "main_light"
    pos: "0 0 5"
    dir: "0 0 -1"
    directional: "true"
    diffuse: "0.65 0.65 0.65"
    specular: "0 0 0"

objects:
  - type: "box"
    name: "factory_back_wall"
    pos: "3.35 0 0.75"
    size: "0.04 2.80 0.75"
    material: "factory_wall_mat"
    mass: 20

  - type: "box"
    name: "factory_front_wall"
    pos: "-2.70 0 0.75"
    size: "0.04 2.80 0.75"
    material: "factory_wall_mat"
    mass: 20

  - type: "box"
    name: "factory_left_wall"
    pos: "0.325 2.80 0.75"
    size: "3.025 0.04 0.75"
    material: "factory_wall_mat"
    mass: 20

  - type: "box"
    name: "factory_right_wall"
    pos: "0.325 -2.80 0.75"
    size: "3.025 0.04 0.75"
    material: "factory_wall_mat"
