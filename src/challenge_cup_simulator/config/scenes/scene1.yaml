# Challenge Cup scene 1: parcel weighing and placement.
scene_name: "Challenge Cup Scene 1"
robot_xml: "biped_s52.xml"

camera:
  center: "0.6 0 1.0"
  extent: "2.5"

visual:
  headlight:
    diffuse: "0.5 0.5 0.5"
    ambient: "0.25 0.25 0.25"
    specular: "0 0 0"
  haze: "0.12 0.16 0.20 1"
  azimuth: 140
  elevation: -18

