    right: [8, 14, 32, -112, 32, -22, 30]
    duration: 1.2
    description: "Pull tray partially out after lifting."

  upper_tray_extract_out:
    left: [20, 0, 0, -30, 0, 0, 0]
    right: [18, 12, 36, -118, 36, -24, 28]
    duration: 1.4
    description: "Pull tray fully out of rack."

  upper_tray_shelf_clearance:
    left: [14, 0, 0, -38, 0, 0, 0]
    right: [12, 8, 28, -100, 28, -15, 30]
    duration: 1.4
    description: "Clear rack pillars before moving to waist."

  waist_stow_pose:
    left: [10, 0, 0, -40, 0, 0, 0]
    right: [10, 0, 0, -60, 0, 10, 0]
