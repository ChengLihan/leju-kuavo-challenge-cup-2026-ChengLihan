    description: "Tray held around waist/chest transport zone."

  finish_hold_pose:
    left: [10, 0, 0, -40, 0, 0, 0]
    right: [10, 0, 0, -60, 0, 10, 0]
    duration: 0.8
    description: "Final stable hold."
