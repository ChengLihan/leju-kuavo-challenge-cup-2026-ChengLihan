# ==============================================================================
#  scene3 上层料盘抓取 —— 全部可调参数
# ==============================================================================

# ---------------------------------------------------------------------------
#  导航: 底盘前移靠近货架
# ---------------------------------------------------------------------------
navigation:
  approach_distance: 1.3   # 前近距离 (m)
  speed: 0.15              # 前进速度 (m/s, 上限 0.20)

# ---------------------------------------------------------------------------
#  目标
# ---------------------------------------------------------------------------
target:
  tray_name: "smt_tray_4"   # 料盘名称 (MuJoCo body name)
  active_arm: "right"       # 抓取手臂: "left" | "right"

# ---------------------------------------------------------------------------
#  IK 抓取阶段
# ---------------------------------------------------------------------------
ik_stages:
  # -----------------------------------------------------------------------
  #  pregrasp: 手移动到料盘上方预备抓取位置
  # -----------------------------------------------------------------------
  pregrasp:
    # ===== 目标位置 (相对料盘在 base_link 系下的偏移) =====
    #  offset 定义:  X 前方为正, Y 左为正, Z 上方为正
    offset_x: -0.20     # 手在料盘后方 20cm (负 = 靠近机器人身体)
    offset_y: 0.0       # Y 方向微调 (正=左移, 负=右移)
    offset_z: 0.08      # Z 方向高度 (手高于料盘 8cm)

    duration: 2.0       # 动作时长 (秒), 单步模式时生效

    # ===== 夹爪姿态 (末端执行器在 base_link 系下的实际空间朝向) =====
    #  注意: 这是夹爪在三维空间中的真实姿态, 不是电机/关节角度
    #  两种写法任选, 优先级: quat > euler_deg > 默认值
    #
    #  写法 A — 欧拉角 (推荐)
    #    euler_deg: [roll, pitch, yaw]  单位: 度(°)
    #    RPY 顺序 (Z-Y-X): roll 绕X, pitch 绕Y, yaw 绕Z
    #    坐标系: X=前, Y=左, Z=上 (base_link 系)
    #
    #  写法 B — 四元数
    #    quat: [x, y, z, w]  (base_link 系)
    #
    #  常用姿态 (base_link 系下看夹爪):
    #    水平朝下 (pitch -90°):  euler_deg: [0, -90, 0]
    #    水平朝前 (pitch   0°):  euler_deg: [0,   0, 0]
    #    侧向 90°  (roll  90°):  euler_deg: [90,  0, 0]
    #    斜向下 30°:              euler_deg: [0, -30, 0]
    #    朝前 + 左偏 15°:         euler_deg: [0, 0, 15]
    orientation:
      euler_deg: [0, -90, 0]    # 夹爪水平朝下

    # ===== 途经点 (可选) =====
    #  如果不定义 waypoints → 使用上方 offset_* 做单步 move_to 直线移动
    #  如果定义了 waypoints → 按顺序途经每个点 (trajectory 模式)
    #  每个途经点坐标同样是相对于料盘的偏移
    #  最后一个途经点即最终目标 (覆盖上方 offset_*)
    #  orientation 可选: 不写则自动继承 (保持当前姿态)
    #  注释掉 = 单步模式; 取消注释 = trajectory 模式
    #waypoints:
    #  # 途经点 1: 先到料盘前上方的安全高度
    #  - offset_x: 0.10      # 料盘前方 10cm
    #    offset_y: 0.0
    #    offset_z: 0.25      # 料盘上方 25cm
    #    duration: 1.5       # 到达该点耗时 (秒)
    #
    #  # 途经点 2: 下降到预备抓取位置
    #  - offset_x: -0.10
    #    offset_y: 0.0
    #    offset_z: 0.12
    #    duration: 1.0
    #    # orientation:                 # 可选, 覆盖该点姿态
    #    #   euler_deg: [0, -45, 0]     # 比如 45° 斜向下

# ---------------------------------------------------------------------------
#  TF 帧配置 (仅供参考, 代码里固定)
# ---------------------------------------------------------------------------
tf:
  ee_frame: "zarm_r7_end_effector"
  reference_frame: "base_link"

# ---------------------------------------------------------------------------
#  夹爪
# ---------------------------------------------------------------------------
gripper:
  close_wait_sec: 0.5
